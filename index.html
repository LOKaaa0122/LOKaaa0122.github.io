<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SPIN // WHEEL</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --neon-blue: #00f0ff;
  --neon-purple: #bf00ff;
  --neon-pink: #ff0090;
  --neon-green: #00ff9f;
  --neon-orange: #ff6a00;
  --dark: #050810;
  --panel: rgba(0,20,40,0.85);
  --border-glow: rgba(0,240,255,0.3);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}
body {
  font-family:'Rajdhani',sans-serif;
  background:var(--dark);color:#cce8ff;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;padding:1.5rem 1rem 2rem;position:relative;
}
#stars-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
#fx-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;}
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,240,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,240,255,0.03) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;
}
header{position:relative;z-index:3;text-align:center;margin-bottom:1.5rem;width:100%;
  transition:opacity .5s ease,transform .5s ease;}
header h1{
  font-family:'Orbitron',sans-serif;font-size:clamp(22px,5vw,38px);font-weight:900;
  letter-spacing:6px;color:#fff;
  text-shadow:0 0 10px var(--neon-blue),0 0 30px var(--neon-blue),0 0 60px rgba(0,240,255,0.4);
}
header .sub{font-size:11px;letter-spacing:4px;color:rgba(0,240,255,0.5);margin-top:4px;text-transform:uppercase;}
.header-line{height:1px;background:linear-gradient(90deg,transparent,var(--neon-blue),transparent);margin-top:10px;box-shadow:0 0 8px var(--neon-blue);}
#app{display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start;justify-content:center;max-width:780px;width:100%;position:relative;z-index:3;}
#left{flex:1;min-width:280px;display:flex;flex-direction:column;align-items:center;
  transition:transform .65s cubic-bezier(.4,0,.2,1);
  will-change:transform;}
#canvas-wrap{position:relative;width:100%;max-width:440px;}
#canvas-wrap::before{
  content:'';position:absolute;inset:-12px;border-radius:50%;
  background:conic-gradient(var(--neon-blue),var(--neon-purple),var(--neon-pink),var(--neon-green),var(--neon-orange),var(--neon-blue));
  animation:spinRing 8s linear infinite;opacity:0.25;filter:blur(6px);z-index:0;
}
@keyframes spinRing{to{transform:rotate(360deg)}}
#canvas-wrap canvas{display:block;width:100%;height:auto;position:relative;z-index:1;border-radius:50%;}
#pointer{
  position:absolute;right:-2px;top:50%;transform:translateY(-50%);z-index:10;
  width:0;height:0;border-top:13px solid transparent;border-bottom:13px solid transparent;
  border-right:30px solid var(--neon-blue);
  filter:drop-shadow(0 0 6px var(--neon-blue)) drop-shadow(0 0 14px var(--neon-blue));
  transition:filter .3s;
}
#spin-btn{
  display:block;width:100%;max-width:440px;margin-top:16px;padding:13px;
  font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;letter-spacing:4px;
  cursor:pointer;color:var(--neon-blue);background:transparent;border:1px solid var(--neon-blue);
  position:relative;overflow:hidden;transition:all .2s, opacity .4s;text-transform:uppercase;
}
#spin-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(0,240,255,0.08),transparent);transform:translateX(-100%);transition:transform .4s;}
#spin-btn:hover::before{transform:translateX(100%)}
#spin-btn:hover{background:rgba(0,240,255,0.08);box-shadow:0 0 20px rgba(0,240,255,0.4),inset 0 0 20px rgba(0,240,255,0.05);color:#fff;}
#spin-btn:active{transform:scale(0.98)}
#spin-btn:disabled{opacity:.35;cursor:not-allowed}
#right{
  width:220px;min-width:180px;background:var(--panel);border:1px solid var(--border-glow);
  padding:16px;position:relative;
  transition:opacity .45s ease,transform .45s ease;
}
#right::before,#right::after{content:'';position:absolute;width:14px;height:14px;border-color:var(--neon-blue);border-style:solid;}
#right::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
#right::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
#right h3{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;color:var(--neon-blue);margin-bottom:10px;text-transform:uppercase;opacity:.8;}
.count-badge{display:inline-block;font-size:10px;padding:1px 6px;background:rgba(0,240,255,0.1);border:1px solid rgba(0,240,255,0.3);color:var(--neon-blue);margin-left:6px;font-family:'Orbitron',sans-serif;}
#add-row{display:flex;gap:6px;margin-bottom:10px;}
#name-input{flex:1;padding:7px 10px;font-size:13px;font-family:'Rajdhani',sans-serif;background:rgba(0,20,40,0.9);border:1px solid rgba(0,240,255,0.3);color:#cce8ff;outline:none;transition:border-color .2s;}
#name-input::placeholder{color:rgba(0,240,255,0.25)}
#name-input:focus{border-color:var(--neon-blue);box-shadow:0 0 8px rgba(0,240,255,0.2)}
#add-btn{padding:7px 10px;font-size:12px;cursor:pointer;font-family:'Orbitron',sans-serif;letter-spacing:1px;background:rgba(0,240,255,0.08);border:1px solid rgba(0,240,255,0.4);color:var(--neon-blue);transition:all .15s;}
#add-btn:hover{background:rgba(0,240,255,0.18);box-shadow:0 0 10px rgba(0,240,255,0.3)}
#names-list{list-style:none;max-height:320px;overflow-y:auto;}
#names-list::-webkit-scrollbar{width:3px}
#names-list::-webkit-scrollbar-track{background:transparent}
#names-list::-webkit-scrollbar-thumb{background:rgba(0,240,255,0.3)}
#names-list li{display:flex;align-items:center;padding:6px 4px;font-size:13px;border-bottom:1px solid rgba(0,240,255,0.07);transition:background .15s;}
#names-list li:hover{background:rgba(0,240,255,0.05)}
#names-list li:last-child{border-bottom:none}
#names-list li .name-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;color:#cce8ff;}
#names-list li .del-btn{background:none;border:none;cursor:pointer;font-size:14px;color:rgba(255,0,144,0.4);padding:0 4px;line-height:1;flex-shrink:0;transition:color .15s,text-shadow .15s;}
#names-list li .del-btn:hover{color:var(--neon-pink);text-shadow:0 0 6px var(--neon-pink);}
.divider{width:100%;height:1px;margin:6px 0;background:linear-gradient(90deg,rgba(0,240,255,0.4),transparent);}

/* ── Spin state ── */
body.wheel-spinning header{opacity:0;transform:translateY(-16px);pointer-events:none;}
body.wheel-spinning #right{opacity:0;transform:translateX(30px);pointer-events:none;}
/* #left zoom handled by JS */
body.wheel-spinning #spin-btn{opacity:0;pointer-events:none;}
body.wheel-spinning #pointer{filter:drop-shadow(0 0 10px var(--neon-blue)) drop-shadow(0 0 26px var(--neon-blue)) drop-shadow(0 0 50px #fff);}

/* ── Winner Modal ── */
#winner-modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(2,6,18,0.82);align-items:center;justify-content:center;backdrop-filter:blur(4px);}
#winner-modal.show{display:flex;animation:fadeOverlay .3s ease;}
@keyframes fadeOverlay{from{opacity:0}to{opacity:1}}
#winner-box{
  position:relative;background:rgba(0,10,25,0.97);border:1px solid var(--neon-green);
  padding:48px 52px 40px;text-align:center;max-width:480px;width:90%;
  animation:popIn .45s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn{from{opacity:0;transform:scale(0.55)}to{opacity:1;transform:scale(1)}}
#winner-box::before,#winner-box::after,.wc-tr,.wc-bl{content:'';position:absolute;width:18px;height:18px;border-color:var(--neon-green);border-style:solid;}
#winner-box::before{top:-1px;left:-1px;border-width:3px 0 0 3px}
#winner-box::after{bottom:-1px;right:-1px;border-width:0 3px 3px 0}
.wc-tr{top:-1px;right:-1px;border-width:3px 3px 0 0;}
.wc-bl{bottom:-1px;left:-1px;border-width:0 0 3px 3px;}
.winner-tag{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:5px;color:var(--neon-green);opacity:.6;text-transform:uppercase;margin-bottom:10px;}
.winner-line{height:1px;background:linear-gradient(90deg,transparent,var(--neon-green),transparent);box-shadow:0 0 8px var(--neon-green);margin:14px 0;}
#winner-modal-name{
  font-family:'Orbitron',sans-serif;font-size:clamp(30px,8vw,54px);font-weight:900;
  color:#fff;letter-spacing:3px;word-break:break-word;
  text-shadow:0 0 16px var(--neon-green),0 0 40px var(--neon-green),0 0 80px rgba(0,255,159,0.35);
  margin:6px 0 22px;
}
.modal-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.modal-btn{padding:11px 24px;font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;cursor:pointer;background:transparent;text-transform:uppercase;transition:all .2s;}
#btn-close{color:var(--neon-blue);border:1px solid var(--neon-blue);}
#btn-close:hover{background:rgba(0,240,255,0.1);box-shadow:0 0 14px rgba(0,240,255,0.3);}
#btn-remove{color:var(--neon-pink);border:1px solid var(--neon-pink);}
#btn-remove:hover{background:rgba(255,0,144,0.1);box-shadow:0 0 14px rgba(255,0,144,0.3);}
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<canvas id="fx-canvas"></canvas>

<div id="winner-modal">
  <div id="winner-box">
    <div class="wc-tr"></div><div class="wc-bl"></div>
    <div class="winner-tag">&#9654; Target Acquired</div>
    <div class="winner-line"></div>
    <div id="winner-modal-name"></div>
    <div class="winner-line"></div>
    <div class="modal-btns">
      <button class="modal-btn" id="btn-close">[ Keep &amp; Close ]</button>
      <button class="modal-btn" id="btn-remove">[ Remove Name ]</button>
    </div>
  </div>
</div>

<header>
  <h1>// WHEEL //</h1>
  <div class="sub">Random Selection System v2.0</div>
  <div class="header-line"></div>
</header>

<div id="app">
  <div id="left">
    <div id="canvas-wrap">
      <canvas id="wheel" width="440" height="440"></canvas>
      <div id="pointer"></div>
    </div>
    <button id="spin-btn">[ INITIATE SPIN ]</button>
  </div>
  <div id="right">
    <h3>Entries <span class="count-badge" id="count">0</span></h3>
    <div class="divider"></div>
    <div id="add-row">
      <input id="name-input" type="text" placeholder="Enter name..." maxlength="30"/>
      <button id="add-btn">ADD</button>
    </div>
    <ul id="names-list"></ul>
  </div>
</div>

<script>
/* ── Stars ── */
(function(){
  const c=document.getElementById('stars-canvas');
  const x=c.getContext('2d');
  let W,H,stars=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;stars=[];for(let i=0;i<180;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2,a:Math.random(),d:Math.random()*.008+.002});}
  function tick(){x.clearRect(0,0,W,H);stars.forEach(s=>{s.a+=s.d;if(s.a>1||s.a<0)s.d*=-1;x.beginPath();x.arc(s.x,s.y,s.r,0,Math.PI*2);x.fillStyle=`rgba(180,220,255,${s.a})`;x.fill();});requestAnimationFrame(tick);}
  window.addEventListener('resize',resize);resize();tick();
})();

/* ── FX Canvas: orbs + shooting stars ── */
const fxC=document.getElementById('fx-canvas');
const fxX=fxC.getContext('2d');
let FW,FH;
function resizeFx(){FW=fxC.width=window.innerWidth;FH=fxC.height=window.innerHeight;}
window.addEventListener('resize',resizeFx);resizeFx();

let fxActive=false;
const ORB_COLS=['#00f0ff','#bf00ff','#ff0090','#00ff9f','#ff6a00','#aa00ff'];
let shoots=[];
let shootTimer=null;
/* each orb has independent speed, direction, wobble radius */
const orbs=[
  {a:0,           speed:-0.028, wobbleSpd:0.031, wobbleAmp:42},
  {a:Math.PI/3,   speed: 0.045, wobbleSpd:0.019, wobbleAmp:60},
  {a:Math.PI*2/3, speed:-0.058, wobbleSpd:0.044, wobbleAmp:30},
  {a:Math.PI,     speed: 0.034, wobbleSpd:0.027, wobbleAmp:68},
  {a:Math.PI*4/3, speed:-0.049, wobbleSpd:0.038, wobbleAmp:45},
  {a:Math.PI*5/3, speed: 0.023, wobbleSpd:0.055, wobbleAmp:52},
];
let wobbleTick=0;

function hexRgb(h){
  return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
}

function spawnShoot(){
  const fromTop=Math.random()<0.5;
  const sx=fromTop?Math.random()*FW:-20;
  const sy=fromTop?-20:Math.random()*FH*0.5;
  const spd=7+Math.random()*9;
  const ang=fromTop?(0.4+Math.random()*0.5):(0.2+Math.random()*0.4);
  shoots.push({x:sx,y:sy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,len:70+Math.random()*110,life:1});
}

function fxLoop(){
  if(!fxActive){fxX.clearRect(0,0,FW,FH);return;}
  fxX.clearRect(0,0,FW,FH);

  /* wheel center from DOM */
  const wrapEl=document.getElementById('canvas-wrap');
  const rect=wrapEl.getBoundingClientRect();
  const cx=rect.left+rect.width/2;
  const cy=rect.top+rect.height/2;
  const orbR=rect.width/2+44;

  /* independent unpredictable orbs */
  wobbleTick+=0.016;
  orbs.forEach((orb,i)=>{
    orb.a+=orb.speed;
    /* wobble radius oscillates at its own frequency */
    const dynR=orbR+Math.sin(wobbleTick*orb.wobbleSpd*18+i)*orb.wobbleAmp;
    const ox=cx+Math.cos(orb.a)*dynR;
    const oy=cy+Math.sin(orb.a)*dynR;
    const col=ORB_COLS[i%ORB_COLS.length];
    const [r,g,b]=hexRgb(col);

    /* outer mega-halo — 5 stacked layers for deep bloom */
    [140,100,70,45,22].forEach((rad,li)=>{
      const alpha=[0.03,0.06,0.12,0.22,0.45][li];
      const gr=fxX.createRadialGradient(ox,oy,0,ox,oy,rad);
      gr.addColorStop(0,`rgba(${r},${g},${b},${alpha})`);
      gr.addColorStop(0.5,`rgba(${r},${g},${b},${alpha*0.4})`);
      gr.addColorStop(1,`rgba(${r},${g},${b},0)`);
      fxX.beginPath();fxX.arc(ox,oy,rad,0,Math.PI*2);
      fxX.fillStyle=gr;fxX.fill();
    });

    /* long smeared tail */
    const tailSteps=14;
    for(let s=1;s<=tailSteps;s++){
      const ta=orb.a-orb.speed*s*3.5;
      const tdR=orbR+Math.sin((wobbleTick-s*0.05)*orb.wobbleSpd*18+i)*orb.wobbleAmp;
      const tx=cx+Math.cos(ta)*tdR;
      const ty=cy+Math.sin(ta)*tdR;
      const alpha=0.22*(1-s/tailSteps);
      const rad2=18*(1-s/tailSteps)+4;
      const tg2=fxX.createRadialGradient(tx,ty,0,tx,ty,rad2);
      tg2.addColorStop(0,`rgba(${r},${g},${b},${alpha})`);
      tg2.addColorStop(1,`rgba(${r},${g},${b},0)`);
      fxX.beginPath();fxX.arc(tx,ty,rad2,0,Math.PI*2);
      fxX.fillStyle=tg2;fxX.fill();
    }

    /* blazing core — multiple shadow passes */
    fxX.shadowColor=col;fxX.shadowBlur=80;
    fxX.beginPath();fxX.arc(ox,oy,12,0,Math.PI*2);
    fxX.fillStyle=`rgba(${r},${g},${b},1)`;fxX.fill();
    fxX.shadowBlur=40;
    fxX.beginPath();fxX.arc(ox,oy,6,0,Math.PI*2);
    fxX.fillStyle=`rgba(255,255,255,0.9)`;fxX.fill();
    fxX.shadowBlur=0;
  });

  /* pulsing center bloom */
  const bloomSize=orbR+80+Math.sin(wobbleTick*0.6)*30;
  const bloom=fxX.createRadialGradient(cx,cy,0,cx,cy,bloomSize);
  bloom.addColorStop(0,`rgba(120,60,255,0.22)`);
  bloom.addColorStop(0.3,`rgba(0,180,255,0.1)`);
  bloom.addColorStop(0.6,`rgba(0,240,255,0.04)`);
  bloom.addColorStop(1,`rgba(0,0,0,0)`);
  fxX.beginPath();fxX.arc(cx,cy,bloomSize,0,Math.PI*2);
  fxX.fillStyle=bloom;fxX.fill();

  /* shooting stars */
  for(let i=shoots.length-1;i>=0;i--){
    const s=shoots[i];
    s.life-=0.016;
    if(s.life<=0){shoots.splice(i,1);continue;}
    const sg=fxX.createLinearGradient(s.x,s.y,s.x-s.vx/8*s.len,s.y-s.vy/8*s.len);
    sg.addColorStop(0,`rgba(200,240,255,${s.life})`);
    sg.addColorStop(0.4,`rgba(0,240,255,${s.life*0.5})`);
    sg.addColorStop(1,`rgba(0,240,255,0)`);
    fxX.beginPath();fxX.moveTo(s.x,s.y);
    fxX.lineTo(s.x-s.vx/8*s.len,s.y-s.vy/8*s.len);
    fxX.strokeStyle=sg;fxX.lineWidth=2;fxX.stroke();
    /* small bright head */
    fxX.beginPath();fxX.arc(s.x,s.y,1.5,0,Math.PI*2);
    fxX.fillStyle=`rgba(255,255,255,${s.life})`;fxX.fill();
    s.x+=s.vx;s.y+=s.vy;
  }

  requestAnimationFrame(fxLoop);
}

function startFX(){
  if(fxActive)return;
  fxActive=true;
  shoots=[];
  spawnShoot();spawnShoot();
  shootTimer=setInterval(spawnShoot,550);
  fxLoop();
}

function stopFX(){
  fxActive=false;
  clearInterval(shootTimer);
  shootTimer=null;
  shoots=[];
  fxX.clearRect(0,0,FW,FH);
}

/* ── Wheel ── */
const NEON = [
  {fill:'#0d1b4b',stroke:'#00f0ff',text:'#00f0ff'},
  {fill:'#1a0a2e',stroke:'#bf00ff',text:'#e580ff'},
  {fill:'#2a0a1a',stroke:'#ff0090',text:'#ff66bb'},
  {fill:'#0a2a1a',stroke:'#00ff9f',text:'#00ffaa'},
  {fill:'#2a1500',stroke:'#ff6a00',text:'#ffaa44'},
  {fill:'#001a2a',stroke:'#00c8ff',text:'#66ddff'},
  {fill:'#1e0d30',stroke:'#9400ff',text:'#cc88ff'},
  {fill:'#2a001a',stroke:'#ff007a',text:'#ff55aa'},
  {fill:'#00200f',stroke:'#00ff7a',text:'#55ffaa'},
  {fill:'#1a1000',stroke:'#ffaa00',text:'#ffcc44'},
  {fill:'#001422',stroke:'#00e5ff',text:'#44eeff'},
  {fill:'#160028',stroke:'#aa00ff',text:'#dd77ff'},
];

let names=['Altkaa','Mandakh','Temuulen','Tuugu','Taivnaa','Buune','Puuje','Oyuka'];
let spinning=false,angle=0,animId=null;
let glowAngle=0;
let lastWinnerIndex=-1;

const canvas=document.getElementById('wheel');
const ctx=canvas.getContext('2d');
const spinBtn=document.getElementById('spin-btn');
const nameInput=document.getElementById('name-input');
const addBtn=document.getElementById('add-btn');
const namesList=document.getElementById('names-list');
const countEl=document.getElementById('count');
const winnerModal=document.getElementById('winner-modal');
const winnerModalName=document.getElementById('winner-modal-name');
const btnClose=document.getElementById('btn-close');
const btnRemove=document.getElementById('btn-remove');

function hexToRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`${r},${g},${b}`;}

function draw(){
  const W=canvas.width,cx=W/2,cy=W/2,r=W/2-6;
  ctx.clearRect(0,0,W,W);
  const n=names.length;

  glowAngle+=0.015;

  /* outer ring */
  ctx.beginPath();
  ctx.arc(cx,cy,r+4,0,Math.PI*2);
  const ringGrad=ctx.createConicalGradient?null:null;
  ctx.strokeStyle=`hsla(${(glowAngle*60)%360},100%,70%,0.5)`;
  ctx.lineWidth=2;
  ctx.shadowColor=`hsl(${(glowAngle*60)%360},100%,70%)`;
  ctx.shadowBlur=12;
  ctx.stroke();
  ctx.shadowBlur=0;

  if(n===0){
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle='#080f1a';ctx.fill();
    ctx.fillStyle='rgba(0,240,255,0.3)';
    ctx.font='14px Orbitron,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('NO ENTRIES',cx,cy);
    return;
  }

  const slice=(Math.PI*2)/n;
  for(let i=0;i<n;i++){
    const start=angle+i*slice;
    const end=start+slice;
    const c2=NEON[i%NEON.length];

    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start,end);
    ctx.closePath();
    ctx.fillStyle=c2.fill;
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start,end);
    ctx.closePath();
    ctx.strokeStyle=c2.stroke+'44';
    ctx.lineWidth=1;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(start);
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(r,0);
    ctx.strokeStyle=c2.stroke+'66';
    ctx.lineWidth=1;
    ctx.shadowColor=c2.stroke;ctx.shadowBlur=4;
    ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(start+slice/2);
    const fSize=Math.min(18,Math.max(11,r*0.82/(names[i].length*0.52)));
    ctx.font=`600 ${fSize}px Rajdhani,sans-serif`;
    ctx.fillStyle=c2.text;
    ctx.shadowColor=c2.stroke;
    ctx.shadowBlur=8;
    ctx.textAlign='right';ctx.textBaseline='middle';
    const lbl=names[i].length>16?names[i].slice(0,15)+'…':names[i];
    ctx.fillText(lbl,r-12,0);
    ctx.restore();
  }

  for(let t=0;t<72;t++){
    const a=angle+(t/72)*Math.PI*2;
    ctx.save();ctx.translate(cx,cy);ctx.rotate(a);
    const big=t%6===0;
    ctx.beginPath();ctx.moveTo(r-2,0);ctx.lineTo(r+(big?5:3),0);
    ctx.strokeStyle=big?'rgba(0,240,255,0.7)':'rgba(0,240,255,0.25)';
    ctx.lineWidth=big?1.5:0.5;
    ctx.stroke();
    ctx.restore();
  }

  const hubGrad=ctx.createRadialGradient(cx,cy,0,cx,cy,20);
  hubGrad.addColorStop(0,'#1a2a4a');
  hubGrad.addColorStop(1,'#050810');
  ctx.beginPath();ctx.arc(cx,cy,20,0,Math.PI*2);
  ctx.fillStyle=hubGrad;ctx.fill();
  ctx.strokeStyle='rgba(0,240,255,0.8)';
  ctx.lineWidth=1.5;
  ctx.shadowColor='#00f0ff';ctx.shadowBlur=10;
  ctx.stroke();
  ctx.shadowBlur=0;

  ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);
  ctx.fillStyle='#00f0ff';
  ctx.shadowColor='#00f0ff';ctx.shadowBlur=10;
  ctx.fill();ctx.shadowBlur=0;

  if(!spinning) requestAnimationFrame(draw);
}

function animateIdle(){if(!spinning){requestAnimationFrame(()=>{draw();animateIdle();})}}

function renderList(){
  namesList.innerHTML='';
  countEl.textContent=names.length;
  names.forEach((name,i)=>{
    const li=document.createElement('li');
    const dot=document.createElement('span');
    const c2=NEON[i%NEON.length];
    dot.style.cssText=`display:inline-block;width:8px;height:8px;border-radius:50%;background:${c2.stroke};box-shadow:0 0 5px ${c2.stroke};margin-right:8px;flex-shrink:0`;
    const lbl=document.createElement('span');
    lbl.className='name-label';lbl.textContent=name;
    const del=document.createElement('button');
    del.className='del-btn';del.textContent='✕';del.title='Remove';
    del.onclick=()=>{names.splice(i,1);renderList();};
    li.appendChild(dot);li.appendChild(lbl);li.appendChild(del);
    namesList.appendChild(li);
  });
}

function addName(){
  const v=nameInput.value.trim();if(!v)return;
  names.push(v);nameInput.value='';
  renderList();
}
addBtn.onclick=addName;
nameInput.onkeydown=e=>{if(e.key==='Enter')addName();};

/* ── Modal controls ── */
btnClose.onclick=()=>{ winnerModal.classList.remove('show'); };
btnRemove.onclick=()=>{
  if(lastWinnerIndex>=0&&lastWinnerIndex<names.length){
    names.splice(lastWinnerIndex,1);
    renderList();
  }
  winnerModal.classList.remove('show');
  lastWinnerIndex=-1;
};

/* ── Spin (untouched) ── */
spinBtn.onclick=()=>{
  if(spinning||names.length<2)return;
  spinning=true;spinBtn.disabled=true;

  const extraSpins=(6+Math.random()*6)*Math.PI*2;
  const slice=(Math.PI*2)/names.length;
  const targetIndex=Math.floor(Math.random()*names.length);
  const targetAngle=Math.PI*2-(targetIndex*slice+slice/2)-angle;
  const totalRotation=extraSpins+((targetAngle%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
  const duration=4500+Math.random()*2000;
  const start=performance.now();
  const startAngle=angle;

  function ease(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}

  function frame(now){
    const t=Math.min((now-start)/duration,1);
    angle=startAngle+totalRotation*ease(t);
    draw();
    if(t<1){animId=requestAnimationFrame(frame);}
    else{
      angle=angle%(Math.PI*2);spinning=false;spinBtn.disabled=false;
      const norm=(Math.PI*2-(angle%(Math.PI*2)))%(Math.PI*2);
      const winner=Math.floor(norm/slice)%names.length;
      /* show modal */
      lastWinnerIndex=winner;
      winnerModalName.textContent=names[winner];
      winnerModal.classList.add('show');
      animateIdle();
    }
  }
  animId=requestAnimationFrame(frame);
};

/* ── FX hooks — separate listener, spin untouched above ── */
function applyWheelZoom(){
  /* measure where the wheel currently sits and translate it to viewport center */
  const leftEl=document.getElementById('left');
  const wrap=document.getElementById('canvas-wrap');
  const wrect=wrap.getBoundingClientRect();
  const wheelCX=wrect.left+wrect.width/2;
  const wheelCY=wrect.top+wrect.height/2;
  const vpCX=window.innerWidth/2;
  const vpCY=window.innerHeight/2;
  const dx=vpCX-wheelCX;
  const dy=vpCY-wheelCY;
  const scale=1.45;
  leftEl.style.transform=`translate(${dx}px,${dy}px) scale(${scale})`;
}

function clearWheelZoom(){
  document.getElementById('left').style.transform='';
}

spinBtn.addEventListener('click',()=>{
  if(names.length<2)return;
  document.body.classList.add('wheel-spinning');
  /* slight delay so header/panel fade starts before we measure position */
  requestAnimationFrame(()=>requestAnimationFrame(applyWheelZoom));
  startFX();
});

/* watch for spin end to restore UI */
(function watchSpin(){
  if(document.body.classList.contains('wheel-spinning')&&!spinning){
    document.body.classList.remove('wheel-spinning');
    clearWheelZoom();
    stopFX();
  }
  requestAnimationFrame(watchSpin);
})();

renderList();
let idleAnim;
(function idle(){idleAnim=requestAnimationFrame(()=>{draw();idle();})})();
</script>
</body>
