<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SPIN // WHEEL</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --neon-blue: #00f0ff;
  --neon-purple: #bf00ff;
  --neon-pink: #ff0090;
  --neon-green: #00ff9f;
  --neon-orange: #ff6a00;
  --dark: #050810;
  --panel: rgba(0,20,40,0.85);
  --border-glow: rgba(0,240,255,0.3);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}

body {
  font-family:'Rajdhani',sans-serif;
  background: var(--dark);
  color: #cce8ff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:1.5rem 1rem 2rem;
  position:relative;
}

/* ── Stars ── */
#stars-canvas {
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;
}

/* ── Grid overlay ── */
body::before {
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,240,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,240,255,0.03) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;z-index:0;
}

/* ── Header ── */
header {
  position:relative;z-index:2;
  text-align:center;margin-bottom:1.5rem;width:100%;
}
header h1 {
  font-family:'Orbitron',sans-serif;
  font-size:clamp(22px,5vw,38px);
  font-weight:900;
  letter-spacing:6px;
  color:#fff;
  text-shadow:
    0 0 10px var(--neon-blue),
    0 0 30px var(--neon-blue),
    0 0 60px rgba(0,240,255,0.4);
}
header .sub {
  font-size:11px;letter-spacing:4px;color:rgba(0,240,255,0.5);
  margin-top:4px;text-transform:uppercase;
}
.header-line {
  height:1px;
  background:linear-gradient(90deg,transparent,var(--neon-blue),transparent);
  margin-top:10px;
  box-shadow:0 0 8px var(--neon-blue);
}

/* ── Layout ── */
#app {
  display:flex;gap:24px;flex-wrap:wrap;
  align-items:flex-start;justify-content:center;
  max-width:780px;width:100%;position:relative;z-index:2;
}

/* ── Wheel panel ── */
#left { flex:1;min-width:280px;display:flex;flex-direction:column;align-items:center; }

#canvas-wrap {
  position:relative;width:100%;max-width:440px;
}
#canvas-wrap::before {
  content:'';
  position:absolute;inset:-12px;border-radius:50%;
  background:conic-gradient(
    var(--neon-blue),var(--neon-purple),var(--neon-pink),
    var(--neon-green),var(--neon-orange),var(--neon-blue)
  );
  animation:spinRing 8s linear infinite;
  opacity:0.25;filter:blur(6px);
  z-index:0;
}
@keyframes spinRing{to{transform:rotate(360deg)}}

#canvas-wrap canvas {
  display:block;width:100%;height:auto;
  position:relative;z-index:1;
  border-radius:50%;
}

/* ── Pointer ── */
#pointer {
  position:absolute;right:-2px;top:50%;
  transform:translateY(-50%);
  z-index:10;
  width:0;height:0;
  border-top:13px solid transparent;
  border-bottom:13px solid transparent;
  border-right:30px solid var(--neon-blue);
  filter:
    drop-shadow(0 0 6px var(--neon-blue))
    drop-shadow(0 0 14px var(--neon-blue));
}

/* ── Spin button ── */
#spin-btn {
  display:block;width:100%;max-width:440px;
  margin-top:16px;
  padding:13px;
  font-family:'Orbitron',sans-serif;
  font-size:14px;font-weight:700;letter-spacing:4px;
  cursor:pointer;
  color:var(--neon-blue);
  background:transparent;
  border:1px solid var(--neon-blue);
  position:relative;overflow:hidden;
  transition:all .2s;
  text-transform:uppercase;
}
#spin-btn::before {
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(0,240,255,0.08),transparent);
  transform:translateX(-100%);
  transition:transform .4s;
}
#spin-btn:hover::before{transform:translateX(100%)}
#spin-btn:hover {
  background:rgba(0,240,255,0.08);
  box-shadow:0 0 20px rgba(0,240,255,0.4),inset 0 0 20px rgba(0,240,255,0.05);
  color:#fff;
}
#spin-btn:active{transform:scale(0.98)}
#spin-btn:disabled{opacity:.35;cursor:not-allowed}

/* ── Winner banner ── */
#winner-banner {
  display:none;width:100%;max-width:440px;
  margin-top:16px;padding:14px 20px;
  background:rgba(0,255,159,0.06);
  border:1px solid var(--neon-green);
  position:relative;text-align:center;
  animation:fadeIn .4s ease;
}
#winner-banner::before,#winner-banner::after {
  content:'';position:absolute;
  width:12px;height:12px;
  border-color:var(--neon-green);border-style:solid;
}
#winner-banner::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
#winner-banner::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
#winner-banner .label {
  font-size:10px;letter-spacing:4px;color:var(--neon-green);
  opacity:.7;text-transform:uppercase;font-family:'Orbitron',sans-serif;
}
#winner-banner strong {
  display:block;margin-top:4px;
  font-family:'Orbitron',sans-serif;
  font-size:clamp(16px,4vw,24px);font-weight:700;
  color:#fff;
  text-shadow:0 0 10px var(--neon-green),0 0 30px var(--neon-green);
  letter-spacing:2px;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── Right panel ── */
#right {
  width:220px;min-width:180px;
  background:var(--panel);
  border:1px solid var(--border-glow);
  padding:16px;
  position:relative;
}
#right::before,#right::after {
  content:'';position:absolute;
  width:14px;height:14px;
  border-color:var(--neon-blue);border-style:solid;
}
#right::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
#right::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0}

#right h3 {
  font-family:'Orbitron',sans-serif;
  font-size:11px;letter-spacing:3px;
  color:var(--neon-blue);margin-bottom:10px;
  text-transform:uppercase;opacity:.8;
}

.count-badge {
  display:inline-block;
  font-size:10px;padding:1px 6px;
  background:rgba(0,240,255,0.1);
  border:1px solid rgba(0,240,255,0.3);
  color:var(--neon-blue);margin-left:6px;
  font-family:'Orbitron',sans-serif;
}

/* ── Add row ── */
#add-row { display:flex;gap:6px;margin-bottom:10px; }
#name-input {
  flex:1;padding:7px 10px;font-size:13px;
  font-family:'Rajdhani',sans-serif;
  background:rgba(0,20,40,0.9);
  border:1px solid rgba(0,240,255,0.3);
  color:#cce8ff;outline:none;
  transition:border-color .2s;
}
#name-input::placeholder{color:rgba(0,240,255,0.25)}
#name-input:focus{border-color:var(--neon-blue);box-shadow:0 0 8px rgba(0,240,255,0.2)}
#add-btn {
  padding:7px 10px;font-size:12px;cursor:pointer;
  font-family:'Orbitron',sans-serif;letter-spacing:1px;
  background:rgba(0,240,255,0.08);
  border:1px solid rgba(0,240,255,0.4);
  color:var(--neon-blue);
  transition:all .15s;
}
#add-btn:hover{background:rgba(0,240,255,0.18);box-shadow:0 0 10px rgba(0,240,255,0.3)}

/* ── Names list ── */
#names-list {
  list-style:none;
  max-height:320px;overflow-y:auto;
}
#names-list::-webkit-scrollbar{width:3px}
#names-list::-webkit-scrollbar-track{background:transparent}
#names-list::-webkit-scrollbar-thumb{background:rgba(0,240,255,0.3)}

#names-list li {
  display:flex;align-items:center;
  padding:6px 4px;font-size:13px;
  border-bottom:1px solid rgba(0,240,255,0.07);
  transition:background .15s;
}
#names-list li:hover{background:rgba(0,240,255,0.05)}
#names-list li:last-child{border-bottom:none}
#names-list li .name-label {
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;
  color:#cce8ff;
}
#names-list li .del-btn {
  background:none;border:none;cursor:pointer;
  font-size:14px;color:rgba(255,0,144,0.4);
  padding:0 4px;line-height:1;flex-shrink:0;
  transition:color .15s,text-shadow .15s;
}
#names-list li .del-btn:hover{
  color:var(--neon-pink);
  text-shadow:0 0 6px var(--neon-pink);
}

/* ── Divider line ── */
.divider {
  width:100%;height:1px;margin:6px 0;
  background:linear-gradient(90deg,rgba(0,240,255,0.4),transparent);
}
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<header>
  <h1>// WHEEL //</h1>
  <div class="sub">Random Selection System v2.0</div>
  <div class="header-line"></div>
</header>

<div id="app">
  <div id="left">
    <div id="canvas-wrap">
      <canvas id="wheel" width="440" height="440"></canvas>
      <div id="pointer"></div>
    </div>
    <button id="spin-btn">[ INITIATE SPIN ]</button>
    <div id="winner-banner">
      <div class="label">&#9654; Selected Target</div>
      <strong id="winner-name"></strong>
    </div>
  </div>

  <div id="right">
    <h3>Entries <span class="count-badge" id="count">0</span></h3>
    <div class="divider"></div>
    <div id="add-row">
      <input id="name-input" type="text" placeholder="Enter name..." maxlength="30"/>
      <button id="add-btn">ADD</button>
    </div>
    <ul id="names-list"></ul>
  </div>
</div>

<script>
/* ── Stars ── */
(function(){
  const c=document.getElementById('stars-canvas');
  const x=c.getContext('2d');
  let W,H,stars=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;stars=[];for(let i=0;i<180;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2,a:Math.random(),d:Math.random()*.008+.002});}
  function tick(){x.clearRect(0,0,W,H);stars.forEach(s=>{s.a+=s.d;if(s.a>1||s.a<0)s.d*=-1;x.beginPath();x.arc(s.x,s.y,s.r,0,Math.PI*2);x.fillStyle=`rgba(180,220,255,${s.a})`;x.fill();});requestAnimationFrame(tick);}
  window.addEventListener('resize',resize);resize();tick();
})();

/* ── Wheel ── */
const NEON = [
  {fill:'#0d1b4b',stroke:'#00f0ff',text:'#00f0ff'},
  {fill:'#1a0a2e',stroke:'#bf00ff',text:'#e580ff'},
  {fill:'#2a0a1a',stroke:'#ff0090',text:'#ff66bb'},
  {fill:'#0a2a1a',stroke:'#00ff9f',text:'#00ffaa'},
  {fill:'#2a1500',stroke:'#ff6a00',text:'#ffaa44'},
  {fill:'#001a2a',stroke:'#00c8ff',text:'#66ddff'},
  {fill:'#1e0d30',stroke:'#9400ff',text:'#cc88ff'},
  {fill:'#2a001a',stroke:'#ff007a',text:'#ff55aa'},
  {fill:'#00200f',stroke:'#00ff7a',text:'#55ffaa'},
  {fill:'#1a1000',stroke:'#ffaa00',text:'#ffcc44'},
  {fill:'#001422',stroke:'#00e5ff',text:'#44eeff'},
  {fill:'#160028',stroke:'#aa00ff',text:'#dd77ff'},
];

let names=['Altkaa','Mandakh','Temuulen','Tuugu','Taivnaa','Buune','Puuje','Oyuka'];
let spinning=false,angle=0,animId=null;
let glowAngle=0;

const canvas=document.getElementById('wheel');
const ctx=canvas.getContext('2d');
const spinBtn=document.getElementById('spin-btn');
const nameInput=document.getElementById('name-input');
const addBtn=document.getElementById('add-btn');
const namesList=document.getElementById('names-list');
const winnerBanner=document.getElementById('winner-banner');
const winnerNameEl=document.getElementById('winner-name');
const countEl=document.getElementById('count');

function hexToRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`${r},${g},${b}`;}

function draw(){
  const W=canvas.width,cx=W/2,cy=W/2,r=W/2-6;
  ctx.clearRect(0,0,W,W);
  const n=names.length;

  glowAngle+=0.015;

  /* outer ring */
  ctx.beginPath();
  ctx.arc(cx,cy,r+4,0,Math.PI*2);
  const ringGrad=ctx.createConicalGradient?null:null;
  ctx.strokeStyle=`hsla(${(glowAngle*60)%360},100%,70%,0.5)`;
  ctx.lineWidth=2;
  ctx.shadowColor=`hsl(${(glowAngle*60)%360},100%,70%)`;
  ctx.shadowBlur=12;
  ctx.stroke();
  ctx.shadowBlur=0;

  if(n===0){
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle='#080f1a';ctx.fill();
    ctx.fillStyle='rgba(0,240,255,0.3)';
    ctx.font='14px Orbitron,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('NO ENTRIES',cx,cy);
    return;
  }

  const slice=(Math.PI*2)/n;
  for(let i=0;i<n;i++){
    const start=angle+i*slice;
    const end=start+slice;
    const c2=NEON[i%NEON.length];

    /* segment fill */
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start,end);
    ctx.closePath();
    ctx.fillStyle=c2.fill;
    ctx.fill();

    /* neon border on each slice */
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start,end);
    ctx.closePath();
    ctx.strokeStyle=c2.stroke+'44';
    ctx.lineWidth=1;
    ctx.stroke();

    /* glow line along radius */
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(start);
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(r,0);
    ctx.strokeStyle=c2.stroke+'66';
    ctx.lineWidth=1;
    ctx.shadowColor=c2.stroke;ctx.shadowBlur=4;
    ctx.stroke();
    ctx.restore();

    /* label */
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(start+slice/2);
    const fSize=Math.min(13,Math.max(8,r*0.62/(names[i].length*0.55)));
    ctx.font=`600 ${fSize}px Rajdhani,sans-serif`;
    ctx.fillStyle=c2.text;
    ctx.shadowColor=c2.stroke;
    ctx.shadowBlur=8;
    ctx.textAlign='right';ctx.textBaseline='middle';
    const lbl=names[i].length>16?names[i].slice(0,15)+'…':names[i];
    ctx.fillText(lbl,r-12,0);
    ctx.restore();
  }

  /* tick marks on outer rim */
  for(let t=0;t<72;t++){
    const a=angle+(t/72)*Math.PI*2;
    ctx.save();ctx.translate(cx,cy);ctx.rotate(a);
    const big=t%6===0;
    ctx.beginPath();ctx.moveTo(r-2,0);ctx.lineTo(r+(big?5:3),0);
    ctx.strokeStyle=big?'rgba(0,240,255,0.7)':'rgba(0,240,255,0.25)';
    ctx.lineWidth=big?1.5:0.5;
    ctx.stroke();
    ctx.restore();
  }

  /* center hub */
  const hubGrad=ctx.createRadialGradient(cx,cy,0,cx,cy,20);
  hubGrad.addColorStop(0,'#1a2a4a');
  hubGrad.addColorStop(1,'#050810');
  ctx.beginPath();ctx.arc(cx,cy,20,0,Math.PI*2);
  ctx.fillStyle=hubGrad;ctx.fill();
  ctx.strokeStyle='rgba(0,240,255,0.8)';
  ctx.lineWidth=1.5;
  ctx.shadowColor='#00f0ff';ctx.shadowBlur=10;
  ctx.stroke();
  ctx.shadowBlur=0;

  /* center dot */
  ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);
  ctx.fillStyle='#00f0ff';
  ctx.shadowColor='#00f0ff';ctx.shadowBlur=10;
  ctx.fill();ctx.shadowBlur=0;

  if(!spinning) requestAnimationFrame(draw);
}

function animateIdle(){if(!spinning){requestAnimationFrame(()=>{draw();animateIdle();})}}

function renderList(){
  namesList.innerHTML='';
  countEl.textContent=names.length;
  names.forEach((name,i)=>{
    const li=document.createElement('li');
    const dot=document.createElement('span');
    const c2=NEON[i%NEON.length];
    dot.style.cssText=`display:inline-block;width:8px;height:8px;border-radius:50%;background:${c2.stroke};box-shadow:0 0 5px ${c2.stroke};margin-right:8px;flex-shrink:0`;
    const lbl=document.createElement('span');
    lbl.className='name-label';lbl.textContent=name;
    const del=document.createElement('button');
    del.className='del-btn';del.textContent='✕';del.title='Remove';
    del.onclick=()=>{names.splice(i,1);renderList();winnerBanner.style.display='none';};
    li.appendChild(dot);li.appendChild(lbl);li.appendChild(del);
    namesList.appendChild(li);
  });
}

function addName(){
  const v=nameInput.value.trim();if(!v)return;
  names.push(v);nameInput.value='';
  renderList();winnerBanner.style.display='none';
}
addBtn.onclick=addName;
nameInput.onkeydown=e=>{if(e.key==='Enter')addName();};

spinBtn.onclick=()=>{
  if(spinning||names.length<2)return;
  spinning=true;spinBtn.disabled=true;
  winnerBanner.style.display='none';

  const extraSpins=(6+Math.random()*6)*Math.PI*2;
  const slice=(Math.PI*2)/names.length;
  const targetIndex=Math.floor(Math.random()*names.length);
  const targetAngle=Math.PI*2-(targetIndex*slice+slice/2)-angle;
  const totalRotation=extraSpins+((targetAngle%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
  const duration=4500+Math.random()*2000;
  const start=performance.now();
  const startAngle=angle;

  function ease(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}

  function frame(now){
    const t=Math.min((now-start)/duration,1);
    angle=startAngle+totalRotation*ease(t);
    draw();
    if(t<1){animId=requestAnimationFrame(frame);}
    else{
      angle=angle%(Math.PI*2);spinning=false;spinBtn.disabled=false;
      const norm=(Math.PI*2-(angle%(Math.PI*2)))%(Math.PI*2);
      const winner=Math.floor(norm/slice)%names.length;
      winnerNameEl.textContent=names[winner];
      winnerBanner.style.display='block';
      animateIdle();
    }
  }
  animId=requestAnimationFrame(frame);
};

renderList();
let idleAnim;
(function idle(){idleAnim=requestAnimationFrame(()=>{draw();idle();})})();
</script>
</body>
</html>
