<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💖 Our 1000th Day 💖</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffb6c1, #ffc0cb, #ffe4e1);
      font-family: "Comic Sans MS", "Segoe UI", sans-serif;
      color: #fff;
      text-align: center;
    }
    .container {
      background: rgba(255, 182, 193, 0.85);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
      max-width: 800px;
      width: 95%;
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
      color: #fff0f5;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.2);
    }
    video {
      width: 100%;
      border-radius: 15px;
      box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
    }
    p {
      margin-top: 15px;
      font-size: 1.2em;
      color: #fffaf0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💖 Happy 1000th Day 💖</h1>
    <video controls autoplay>
      <source src="1000th.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <p>For the love of my life ✨</p>
  </div>
</body>
</html>
